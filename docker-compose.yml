services:
  db:
    image: postgres:16-alpine
    container_name: graduate_audit_db
    environment:
      POSTGRES_DB: graduate_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graduate_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: graduate_audit_backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/graduate_audit
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
